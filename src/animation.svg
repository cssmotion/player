  <circle class="cssm-p cssm-p3" cx="200" cy="200" r="8"/>
  <circle class="cssm-p cssm-p4" cx="200" cy="200" r="5"/>

  <!-- Small squares - secondary color -->
  <rect class="cssm-p cssm-p5" x="196" y="196" width="9" height="9"/>
  <rect class="cssm-p cssm-p6" x="197" y="197" width="7" height="7"/>
  <rect class="cssm-p cssm-p7" x="196" y="196" width="10" height="10"/>
  <rect class="cssm-p cssm-p8" x="197" y="197" width="8" height="8"/>

  <!-- Thin rectangles - accent color -->
  <rect class="cssm-p cssm-p9"  x="198" y="195" width="5" height="12"/>
  <rect class="cssm-p cssm-p10" x="195" y="198" width="12" height="5"/>
